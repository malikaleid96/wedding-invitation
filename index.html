<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دعوة زفاف</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f9f9f9; }
        .card { border: 1px solid #ddd; padding: 30px; border-radius: 15px; background: white; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="welcomeText">جاري التحميل...</h1>
        <p>نحن بانتظار تشريفكم في صالة الهاشمية</p>
        <p>الساعة: 9:00 مساءً</p>
    </div>

    <script>
        // قائمة الضيوف (يمكنك التعديل عليها هنا)
        const guests = {
            "G001": "أحمد",
            "G002": "ياسين",
            "G003": "عامر",
            "G004": "ياسر",
            "G005": "خليل",
            "G006": "محمد"
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const welcomeText = document.getElementById('welcomeText');

        if (id && guests[id]) {
            welcomeText.innerText = "أهلاً بك يا " + guests[id];
        } else {
            welcomeText.innerText = "أهلاً بك في حفل زفافنا";
        }
    </script>
</body>
</html>
